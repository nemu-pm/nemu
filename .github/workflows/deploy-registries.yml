name: Deploy Extension Registries

on:
  schedule:
    # Check every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_tachiyomi_rebuild:
        description: 'Force rebuild all Tachiyomi extensions'
        required: false
        default: 'false'
        type: boolean
      tachiyomi_extensions:
        description: 'Specific Tachiyomi extensions to build (comma-separated)'
        required: false
        default: ''
        type: string
  push:
    paths:
      - 'packages/tachiyomi-js/**'
      - 'dev/aidoku-source-authors-base.json'
      - 'dev/tachiyomi-extension-authors-base.json'
      - 'dev/get-*.ts'
      - 'dev/generate-*.ts'
      - '.github/workflows/deploy-registries.yml'

concurrency:
  group: deploy-registries
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Aidoku Registry (fetch upstream + enrich with authors)
  # ============================================================================
  aidoku:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      
      - name: Install dependencies
        run: bun install
      
      - name: Fetch upstream and generate registry
        run: |
          mkdir -p dist/aidoku
          curl -sL https://aidoku-community.github.io/sources/index.min.json -o dist/aidoku/upstream.json
          bun dev/generate-aidoku-registry.ts
      
      - name: Upload Aidoku artifact
        uses: actions/upload-artifact@v4
        with:
          name: aidoku-registry
          path: dist/aidoku/
          retention-days: 1

  # ============================================================================
  # Tachiyomi Extensions (detect changes + build + generate registry)
  # ============================================================================
  tachiyomi-detect:
    runs-on: ubuntu-latest
    outputs:
      extensions: ${{ steps.detect.outputs.extensions }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Detect changed extensions
        id: detect
        run: |
          cd vendor/keiyoushi/extensions-source
          
          LAST_COMMIT="${{ vars.KEIYOUSHI_LAST_COMMIT }}"
          
          if [ "${{ inputs.force_tachiyomi_rebuild }}" == "true" ]; then
            echo "Force rebuild requested"
            EXTENSIONS=$(find src -mindepth 2 -maxdepth 2 -type d | sed 's|src/||' | sort | tr '\n' ',' | sed 's/,$//')
          elif [ -n "${{ inputs.tachiyomi_extensions }}" ]; then
            EXTENSIONS="${{ inputs.tachiyomi_extensions }}"
          elif [ -z "$LAST_COMMIT" ]; then
            echo "No last commit found, will skip build (run with force_rebuild to initialize)"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "extensions=" >> $GITHUB_OUTPUT
            exit 0
          else
            CHANGED_FILES=$(git diff --name-only "$LAST_COMMIT" HEAD -- src/ 2>/dev/null || echo "")
            
            if [ -z "$CHANGED_FILES" ]; then
              echo "No changes detected"
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "extensions=" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            EXTENSIONS=$(echo "$CHANGED_FILES" | grep '^src/' | cut -d'/' -f2-3 | sort -u | tr '\n' ',' | sed 's/,$//')
          fi
          
          echo "Extensions to build: $EXTENSIONS"
          echo "extensions=$EXTENSIONS" >> $GITHUB_OUTPUT
          
          if [ -n "$EXTENSIONS" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

  tachiyomi-build:
    needs: tachiyomi-detect
    if: needs.tachiyomi-detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
      
      - name: Install dependencies
        run: bun install
      
      - name: Build extensions (chunk ${{ matrix.chunk }})
        run: |
          EXTENSIONS="${{ needs.tachiyomi-detect.outputs.extensions }}"
          IFS=',' read -ra EXT_ARRAY <<< "$EXTENSIONS"
          TOTAL=${#EXT_ARRAY[@]}
          
          CHUNK_SIZE=$(( (TOTAL + 3) / 4 ))
          START=$(( ${{ matrix.chunk }} * CHUNK_SIZE ))
          END=$(( START + CHUNK_SIZE ))
          
          if [ $START -ge $TOTAL ]; then
            echo "No extensions in this chunk"
            exit 0
          fi
          
          cd packages/tachiyomi-js
          
          for i in $(seq $START $(( END - 1 ))); do
            if [ $i -ge $TOTAL ]; then break; fi
            EXT="${EXT_ARRAY[$i]}"
            echo "::group::Building $EXT"
            ./gradlew devBuild -Pextension="$EXT" --no-daemon || echo "::warning::Failed to build $EXT"
            echo "::endgroup::"
          done
      
      - name: Upload built extensions
        uses: actions/upload-artifact@v4
        with:
          name: tachiyomi-chunk-${{ matrix.chunk }}
          path: dev/tachiyomi-extensions/
          retention-days: 1
          if-no-files-found: ignore

  tachiyomi-registry:
    needs: [tachiyomi-detect, tachiyomi-build]
    if: always() && needs.tachiyomi-detect.result == 'success'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      
      - name: Install dependencies
        run: bun install
      
      - name: Download build artifacts
        if: needs.tachiyomi-build.result == 'success'
        uses: actions/download-artifact@v4
        with:
          path: dev/tachiyomi-extensions/
          pattern: tachiyomi-chunk-*
          merge-multiple: true
      
      - name: Restore cached extensions
        uses: actions/cache/restore@v4
        with:
          path: dist/tachiyomi/tachiyomi-extensions
          key: tachiyomi-extensions-v1
          restore-keys: |
            tachiyomi-extensions-
      
      - name: Merge extensions
        run: |
          mkdir -p dist/tachiyomi/tachiyomi-extensions
          if [ -d "dev/tachiyomi-extensions" ] && [ "$(ls -A dev/tachiyomi-extensions 2>/dev/null)" ]; then
            cp -r dev/tachiyomi-extensions/* dist/tachiyomi/tachiyomi-extensions/
          fi
      
      - name: Generate registry
        run: bun dev/generate-tachiyomi-registry.ts
      
      - name: Save extension cache
        uses: actions/cache/save@v4
        with:
          path: dist/tachiyomi/tachiyomi-extensions
          key: tachiyomi-extensions-v1-${{ github.run_id }}
      
      - name: Upload Tachiyomi artifact
        uses: actions/upload-artifact@v4
        with:
          name: tachiyomi-registry
          path: dist/tachiyomi/
          retention-days: 1

  # ============================================================================
  # Deploy combined registries to GitHub Pages
  # ============================================================================
  deploy:
    needs: [aidoku, tachiyomi-registry]
    if: always() && (needs.aidoku.result == 'success' || needs.tachiyomi-registry.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Aidoku registry
        if: needs.aidoku.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: aidoku-registry
          path: dist/aidoku/
      
      - name: Download Tachiyomi registry
        if: needs.tachiyomi-registry.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: tachiyomi-registry
          path: dist/tachiyomi/
      
      - name: Create index page
        run: |
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Nemu Extension Registries</title>
            <meta charset="utf-8">
            <style>
              body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
              a { color: #0066cc; }
              code { background: #f4f4f4; padding: 0.2em 0.4em; border-radius: 3px; }
            </style>
          </head>
          <body>
            <h1>Nemu Extension Registries</h1>
            <h2>Aidoku Sources</h2>
            <ul>
              <li><a href="aidoku/index.json">aidoku/index.json</a> (with author metadata)</li>
              <li><a href="aidoku/index.min.json">aidoku/index.min.json</a> (minified)</li>
            </ul>
            <h2>Tachiyomi Extensions</h2>
            <ul>
              <li><a href="tachiyomi/index.json">tachiyomi/index.json</a></li>
              <li><a href="tachiyomi/index.min.json">tachiyomi/index.min.json</a></li>
            </ul>
          </body>
          </html>
          EOF
      
      - name: Update keiyoushi commit tracker
        if: needs.tachiyomi-registry.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.actions.createOrUpdateRepoVariable({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'KEIYOUSHI_LAST_COMMIT',
                value: context.sha
              });
            } catch (e) {
              console.log('Could not update variable:', e.message);
            }
      
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

